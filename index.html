<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap');

.title {
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: #1e2b54;
      margin-bottom: 20px;
}

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'Pretendard', 'Malgun Gothic', sans-serif; background: #fff; }

    .card {
      display: flex;
      max-width: 800px;
      margin: 0 auto;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .info {
      flex: 1;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .brand img.flag {
      width: 28px;
      height: auto;
      border: 1px solid #000;
    }

.brand-logo {
      height: 22px;
      width: auto;
}

    .brand-sub {
      font-size: 30px;
      font-weight: 600;
      color: #111;
      margin-left: 4px;
}

    .product-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .product-title h2 {
      font-size: 20px;
      font-weight: 700;
      color: #111;
    }

.detail-link {
      font-size: 12px;
      color: #fff;
      background: #111;
      padding: 4px 10px;
      border-radius: 4px;
      text-decoration: none;
      border: 1px solid #111;
      transition: all 0.2s;
}

.detail-link:hover {
      background: #fff;
      color: #111;
}

    .specs {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .spec-row {
      display: flex;
      font-size: 14px;
      line-height: 1.6;
    }

    .spec-label {
      width: 160px;
      color: #555;
    }

    .spec-value {
      color: #111;
      font-weight: 500;
    }

    .thumb {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 40px;
      background: #fafafa;
    }

    .thumb a { display: block; }

    .thumb img {
      max-width: 100%;
      max-height: 300px;
      object-fit: contain;
      transition: transform 0.2s;
    }

    .thumb img:hover {
      transform: scale(1.03);
    }

    /* 모바일 반응형 */
    @media (max-width: 600px) {
      .card {
        flex-direction: column-reverse;
      }

      .thumb {
        padding: 24px 20px 12px;
      }

      .info {
        padding: 20px;
      }

      .brand-name {
        font-size: 18px;
      }

      .product-title h2 {
        font-size: 17px;
      }

      .spec-label {
        width: 130px;
        font-size: 13px;
      }

      .spec-value {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <p class="title">Compatible AI Accelerator Module</p>

  <div class="card">
    <div class="info">
      <div class="brand">
        <img class="flag" src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/09/Flag_of_South_Korea.svg/120px-Flag_of_South_Korea.svg.png" alt="대한민국">
        <img class="brand-logo" src="https://jxkyxng.github.io/ynotwebcomp/DEEPX.svg" alt="DEEPX">
<span class="brand-sub">국산 AI 가속기</span>
      </div>
      <br>
      <div class="product-title">
        <h2>DX-M1</h2>
        <a class="detail-link" href="https://y-not.kr/products/afa6ef68-710f-4cd7-adc6-3cd9ec738776" target="_blank">자세히보기</a>
      </div>
      <div class="specs">
        <div class="spec-row">
          <span class="spec-label">AI Performance</span>
          <span class="spec-value">25 TOPS</span>
        </div>
        <div class="spec-row">
          <span class="spec-label">Power Efficiency</span>
          <span class="spec-value">2~5W</span>
        </div>
        <div class="spec-row">
          <span class="spec-label">Chipset</span>
          <span class="spec-value">DX-M1</span>
        </div>
        <div class="spec-row">
          <span class="spec-label">Form Factor</span>
          <span class="spec-value">M.2 2280 (M-Key)</span>
        </div>
      </div>
    </div>
    <div class="thumb">
      <a href="https://y-not.kr/products/afa6ef68-710f-4cd7-adc6-3cd9ec738776" target="_blank">
        <img src="https://jxkyxng.github.io/ynotwebcomp/DX-M1.png" alt="DEEPX DX-M1">
      </a>
    </div>
  </div>
</body>
</html>
